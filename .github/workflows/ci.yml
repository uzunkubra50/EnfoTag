name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend testleri (Django)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Django sistem kontrolü
        run: python manage.py check

      - name: Bağımlılık güvenlik taraması (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Testleri çalıştır (coverage ile)
        run: |
          pip install coverage
          coverage run --source=barcodes manage.py test barcodes -v 2
          coverage report -m

  frontend:
    name: Frontend testleri ve build (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Bağımlılık güvenlik taraması (npm audit)
        run: npm audit --audit-level=high

      - name: Testleri çalıştır
        run: npm test

      - name: Production build
        run: npm run build

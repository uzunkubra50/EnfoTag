services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: barkod
      POSTGRES_USER: barkod
      POSTGRES_PASSWORD: barkod
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barkod"]
      interval: 2s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: barkod
      POSTGRES_USER: barkod
      POSTGRES_PASSWORD: barkod
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # web-based database browser (dev convenience, not part of the app itself)
  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
